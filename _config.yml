about_content: | # this will include new lines to allow paragraphs
  Hey, My name is **Elizaveta Garkina**, date of birth **01.09.2002**, at the moment I live in **Kazan**.
  Have been involved in mobile app development **since 2021** in commercial native Android development — ranging from product startups to large-scale fintech. I have experience **leading cross-team and cross-platform features**, mentoring, and driving architectural decisions and the adoption of new technologies.
  Started out with **Flutter** development, but got into native development pretty quickly. I also have a little experience of creating websites using **Asp.Net Core** and **ReactNative**.

  <mark>Desired position:</mark> **Senior / Lead Android Developer**

  - Native language is Russian
  - English level is C1
  - Also know a little bit of French and Spanish
  
  - Sociable and easily join the team
  - Fast learner and inquisitive
  - Always meet deadlines and have the makings of a good leader

